<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="28" fill="#F7F3EB"/>
  <rect x="36" y="36" width="1128" height="648" rx="24" fill="#FFFDF8" stroke="#D5CEC1" stroke-width="2"/>
  <text x="72" y="108" fill="#2D4F73" font-size="42" font-family="Georgia, 'Times New Roman', serif" font-weight="700">MLOS 方法记忆图</text>
  <text x="72" y="145" fill="#5D6B79" font-size="22" font-family="Georgia, 'Times New Roman', serif">先看多数类密度，再限位生成，最后清理边界</text>

  <rect x="72" y="196" width="300" height="362" rx="26" fill="#EEF3F8" stroke="#A8BDD2" stroke-width="2"/>
  <text x="102" y="244" fill="#2D4F73" font-size="24" font-family="Georgia, 'Times New Roman', serif" font-weight="700">01 多数类密度轮廓</text>
  <text x="102" y="282" fill="#1F2933" font-size="19" font-family="Georgia, 'Times New Roman', serif">• 用马氏距离估计多数类概率轮廓</text>
  <text x="102" y="318" fill="#1F2933" font-size="19" font-family="Georgia, 'Times New Roman', serif">• 判断哪里属于高风险重叠区</text>
  <text x="102" y="354" fill="#1F2933" font-size="19" font-family="Georgia, 'Times New Roman', serif">• 不再只凭少数类近邻盲目插值</text>
  <ellipse cx="226" cy="455" rx="82" ry="50" fill="#DDE8F1"/>
  <ellipse cx="200" cy="455" rx="18" ry="18" fill="#2D4F73"/>
  <ellipse cx="246" cy="435" rx="14" ry="14" fill="#8FAECC"/>
  <ellipse cx="266" cy="470" rx="12" ry="12" fill="#8FAECC"/>
  <ellipse cx="232" cy="485" rx="10" ry="10" fill="#8FAECC"/>
  <path d="M160 455C188 412 271 408 300 455" stroke="#2D4F73" stroke-width="3" stroke-dasharray="7 7"/>

  <rect x="450" y="196" width="300" height="362" rx="26" fill="#F5EFE5" stroke="#D8C7AC" stroke-width="2"/>
  <text x="480" y="244" fill="#8A5A2B" font-size="24" font-family="Georgia, 'Times New Roman', serif" font-weight="700">02 局部辅助点限位</text>
  <text x="480" y="282" fill="#1F2933" font-size="19" font-family="Georgia, 'Times New Roman', serif">• 对每个少数类种子找相似密度辅助点</text>
  <text x="480" y="318" fill="#1F2933" font-size="19" font-family="Georgia, 'Times New Roman', serif">• 生成位置必须符合局部一致性</text>
  <text x="480" y="354" fill="#1F2933" font-size="19" font-family="Georgia, 'Times New Roman', serif">• 避免新样本越界到多数类区域</text>
  <circle cx="545" cy="460" r="18" fill="#A85D38"/>
  <circle cx="603" cy="430" r="14" fill="#D98B5F"/>
  <circle cx="646" cy="468" r="14" fill="#D98B5F"/>
  <circle cx="585" cy="488" r="12" fill="#F0B58A"/>
  <path d="M545 460L603 430" stroke="#8A5A2B" stroke-width="3"/>
  <path d="M545 460L646 468" stroke="#8A5A2B" stroke-width="3"/>
  <path d="M545 460L585 488" stroke="#8A5A2B" stroke-width="3"/>
  <text x="518" y="534" fill="#8A5A2B" font-size="18" font-family="Georgia, 'Times New Roman', serif">seed + density-matched auxiliary point</text>

  <rect x="828" y="196" width="300" height="362" rx="26" fill="#EEF1EA" stroke="#B8C4AE" stroke-width="2"/>
  <text x="858" y="244" fill="#49643A" font-size="24" font-family="Georgia, 'Times New Roman', serif" font-weight="700">03 Pair-wise cleaning</text>
  <text x="858" y="282" fill="#1F2933" font-size="19" font-family="Georgia, 'Times New Roman', serif">• 生成后继续检查边界附近样本</text>
  <text x="858" y="318" fill="#1F2933" font-size="19" font-family="Georgia, 'Times New Roman', serif">• 根据概率密度清掉不干净点</text>
  <text x="858" y="354" fill="#1F2933" font-size="19" font-family="Georgia, 'Times New Roman', serif">• 让决策边界更清晰、更可分</text>
  <circle cx="900" cy="458" r="14" fill="#49643A"/>
  <circle cx="960" cy="430" r="14" fill="#7B9A68"/>
  <circle cx="1012" cy="474" r="14" fill="#7B9A68"/>
  <circle cx="1065" cy="442" r="14" fill="#C96262"/>
  <path d="M1049 426L1081 458" stroke="#B23A3A" stroke-width="4"/>
  <path d="M1081 426L1049 458" stroke="#B23A3A" stroke-width="4"/>
  <text x="884" y="532" fill="#49643A" font-size="18" font-family="Georgia, 'Times New Roman', serif">keep clean synthetic points, remove boundary noise</text>

  <path d="M372 377H430" stroke="#2D4F73" stroke-width="4" stroke-linecap="round"/>
  <path d="M417 365L435 377L417 389" fill="#2D4F73"/>
  <path d="M750 377H808" stroke="#2D4F73" stroke-width="4" stroke-linecap="round"/>
  <path d="M795 365L813 377L795 389" fill="#2D4F73"/>

  <rect x="72" y="594" width="1056" height="58" rx="18" fill="#FAF7F0" stroke="#D5CEC1"/>
  <text x="100" y="630" fill="#1F2933" font-size="22" font-family="Georgia, 'Times New Roman', serif">记忆口诀：多数类密度先画危险地图 → 相似密度辅助点把生成位置卡住 → pair-wise cleaning 把边界擦干净</text>
</svg>
